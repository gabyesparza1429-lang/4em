<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Livre de 4ème</title>
<style>
body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background:#cce7ff;
  display:flex;
  justify-content:center;
  padding:40px 0;
  margin:0;
}
.book {
  background:#fff;
  width:90%;
  max-width:1000px;
  min-height:600px;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  position:relative;
  padding:40px 30px 40px 90px;
  box-sizing:border-box;
  overflow:hidden;
}
.spiral {
  position:absolute;
  left:20px;
  top:20px;
  bottom:20px;
  width:50px;
  display:flex;
  flex-direction:column;
  justify-content:space-around;
}
.spiral div {
  width:14px;
  height:14px;
  background:#555;
  border-radius:50%;
  box-shadow: 0 2px 2px rgba(0,0,0,0.2);
}
h1 {
  text-align:center;
  color:#1e3a8a;
  margin-top:0;
  font-size:2em;
  letter-spacing:1px;
}
p.subtitle {
  text-align:center;
  color:#64748b;
  margin-top:5px;
  font-size:1em;
}
.container {
  display:grid;
  grid-template-columns:repeat(2, 1fr);
  gap:25px;
  margin-top:50px;
}
.button {
  background:#1e40af;
  color:white;
  border:none;
  border-radius:10px;
  padding:18px;
  font-size:18px;
  cursor:pointer;
  transition:0.3s;
  width:100%;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
}
.button:hover {
  background:#1e3a8a;
  transform:translateY(-4px) scale(1.02);
}
@media(max-width:700px){
  .container {
    grid-template-columns:1fr;
  }
}
</style>
</head>
<body>

<div class="book">
  <div class="spiral">
    <div></div>
    <div></div>
    <div></div>
    <div></div>
    <div></div>
    <div></div>
  </div>
  <h1>Livre de l'élève – 4ème</h1>
  <p class="subtitle">Cliquez sur une matière pour voir les thèmes / Haz clic en una materia para ver los temas</p>

  <div class="container">
    <button class="button" onclick="location.href='allemand.html'">Allemand</button>
    <button class="button" onclick="location.href='math.html'">Math</button>
    <button class="button" onclick="location.href='physique-chimie.html'">Physique-Chimie</button>
    <button class="button" onclick="location.href='espagnol.html'">Espagnol</button>
    <button class="button" onclick="location.href='techno.html'">Techno</button>
    <button class="button" onclick="location.href='anglais.html'">Anglais</button>
    <button class="button" onclick="location.href='svt-francais.html'">SVT / Français</button>
  </div>
</div>

</body>
</html>
