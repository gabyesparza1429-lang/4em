<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Livre de 4ème</title>
<style>
body {
  font-family: Arial, sans-serif;
  background:#cce7ff; /* color de fondo exterior */
  display:flex;
  justify-content:center;
  padding:40px 0;
  margin:0;
}
.book {
  background:white;
  width:90%;
  max-width:900px;
  min-height:600px;
  border-radius:10px;
  box-shadow:0 8px 20px rgba(0,0,0,0.2);
  position:relative;
  padding:40px 20px 40px 80px; /* espacio para espiral */
  box-sizing:border-box;
}
.spiral {
  position:absolute;
  left:20px;
  top:20px;
  bottom:20px;
  width:40px;
  display:flex;
  flex-direction:column;
  justify-content:space-around;
}
.spiral div {
  width:12px;
  height:12px;
  background:#888;
  border-radius:50%;
}
h1 {
  text-align:center;
  color:#1e3a8a;
  margin-top:0;
}
p.subtitle {
  text-align:center;
  color:#64748b;
  margin-top:5px;
}
.container {
  display:grid;
  grid-template-columns:repeat(2, 1fr);
  gap:20px;
  margin-top:40px;
}
.button {
  background:#2563eb;
  color:white;
  border:none;
  border-radius:8px;
  padding:15px;
  font-size:18px;
  cursor:pointer;
  transition:0.2s;
  width:100%;
}
.button:hover {
  background:#1d4ed8;
  transform:translateY(-3px);
}
@media(max-width:600px){
  .container {
    grid-template-columns:1fr;
  }
}
</style>
</head>
<body>

<div class="book">
  <div class="spiral">
    <div></div>
    <div></div>
    <div></div>
    <div></div>
    <div></div>
    <div></div>
  </div>
  <h1>Livre de l'élève – 4ème</h1>
  <p class="subtitle">Cliquez sur une matière pour voir les thèmes / Haz clic en una materia para ver los temas</p>

  <div class="container">
    <button class="button" onclick="location.href='allemand.html'">Allemand</button>
    <button class="button" onclick="location.href='math.html'">Math</button>
    <button class="button" onclick="location.href='physique-chimie.html'">Physique-Chimie</button>
    <button class="button" onclick="location.href='espagnol.html'">Espagnol</button>
    <button class="button" onclick="location.href='techno.html'">Techno</button>
    <button class="button" onclick="location.href='anglais.html'">Anglais</button>
    <button class="button" onclick="location.href='svt-francais.html'">SVT / Français</button>
  </div>
</div>

</body>
</html>
